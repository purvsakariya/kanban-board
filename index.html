<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban - Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="leftNavBtn">Kanban</div>
            <button class="rightNavBtn">Add new Task</button>
        </nav>
        <div class="sections">
            <section class="to-doSec column" id="to-do">
                <div class="to-doInfo">
                    <span>To-Do</span>
                    <span class="to-doTC count">0</span>
                </div>      
            </section>
            <section class="inProgressSec column" id="inProgress">
                <div class="inProgressInfo">
                    <span>In Progress</span>
                    <span class="inProgressTC count">0</span>
                </div>
            </section> 
            <section class="doneSec column" id="done">
                <div class="doneInfo">
                    <span>Done</span>
                    <span class="doneTC count">0</span>
                </div>
            </section>
        </div>
    </main>
    <div class="fAddTaskPopUp">
        <input type="text" name="Task Title" id="fnewTaskTitle" placeholder="Task Title">
        <input type="text" name="Task Description" id="snewTaskTitle" placeholder="Task Description">
        <input type="submit" value="submit" id="newTaskSubmitBtn">
    </div>
    <div class="bgPopUp"></div>
</body>
<script src="script.js"></script>

</html>
